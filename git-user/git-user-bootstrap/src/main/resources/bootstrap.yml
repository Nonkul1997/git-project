spring:
  # 项目名称
  application:
    name: git-user
  # 当前环境
  profiles:
    active: dev
  # nacos默认监听${spring.application.name}和${spring.application.name}.${file-extension}
  # 和${spring.application.name}-${spring.profiles.active}.${file-extension}
  cloud:
    nacos:
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        namespace: a977fe7c-6575-474a-9fbe-51b9b275f12c
        group: git-user
        file-extension: yml