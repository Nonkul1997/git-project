server:
  # 端口
  port: 32000
  servlet:
    # 上下文
    context-path: /git-user

spring:
  # 项目名称
  application:
    name: git-user
  # 当前环境
  profiles:
    active: dev
  # jackson时间格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  cloud:
    # nacos地址和命名空间配置
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: 20562246-32e6-4308-b8a5-9688d3b38e89
        enabled: true

mybatis-plus:
  # 实体类设置别名
  type-aliases-package: org.example.project.po

logging:
  # 打印sql语句
  level:
    org.example.project.mapper: trace

knife4j:
  # 开启增强模式
  enable: true